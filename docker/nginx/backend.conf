server {
  listen 80;
  server_name _;

  client_max_body_size 100M;

  root /var/www/html/buddyscript/public;
  index index.php index.html;

  location = /swagger {
    return 301 $scheme://$http_host/swagger/;
  }

  location ^~ /swagger/ {
    auth_basic "BuddyScript Swagger";
    auth_basic_user_file /etc/nginx/conf.d/swagger.htpasswd;
    try_files $uri $uri/ /swagger/index.html;
  }

  location / {
    try_files $uri $uri/index.html $uri/ /index.php?$query_string;
  }

  location ~ \.php$ {
    fastcgi_pass php:9000;
    fastcgi_index index.php;

    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;

    # Preserve original host with port, e.g. localhost:8080
    fastcgi_param HTTP_HOST $http_host;
    fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
    fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
    fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
    fastcgi_param HTTP_X_REAL_IP $remote_addr;
    fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;

    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
  }

  location ~ /\.env {
    deny all;
  }

  location ~ /\.ht {
    deny all;
  }
}
